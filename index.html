    <!-- Main Content Area -->
    <div id="content-display">
        <!-- Load dynamic content here -->
    </div>
<script>
document.addEventListener('DOMContentLoaded', function () {
    // Ambil elemen offcanvas
    var myOffcanvas = document.getElementById('sidebarPKA');
    var bsOffcanvas = new bootstrap.Offcanvas(myOffcanvas);

    // Ambil semua link di dalam offcanvas body
    var navLinks = myOffcanvas.querySelectorAll('.nav-link');

    navLinks.forEach(function (link) {
        link.addEventListener('click', function () {
            // Tutup offcanvas secara otomatis setelah diklik
            bsOffcanvas.hide();
        });
    });
});
</script>
