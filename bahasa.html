<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bahasa (Export)</title>
  <style>
    body{font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;margin:20px}
    table{border-collapse:collapse;width:100%;margin-bottom:1.5rem}
    th,td{border:1px solid #ddd;padding:6px 8px;text-align:left}
    th{background:#f2f2f2}
    section{margin-bottom:2rem}
    pre{white-space:pre-wrap;word-wrap:break-word}
  </style>
</head>
<body>
  <h1>Translation export (bahasa)</h1>
  <p>This page renders the translations (id/en/ar) by loading the existing js/bahasa.synced.js from the static tree.</p>
  <div id="content">Loading translations...</div>
  <script src="js/bahasa.js"></script>
  <script>
    function renderKamus(){
      const container = document.getElementById('content');
      if(!window.kamus){ container.innerHTML = '<p><em>Translation data (kamus) not found. Make sure js/bahasa.synced.js is present.</em></p>'; return; }
      container.innerHTML = '';
      for(const lang of Object.keys(kamus)){
        const sec = document.createElement('section');
        const h2 = document.createElement('h2'); h2.textContent = lang.toUpperCase(); sec.appendChild(h2);
        const table = document.createElement('table');
        const thead = document.createElement('thead'); thead.innerHTML = '<tr><th>Key</th><th>Value</th></tr>'; table.appendChild(thead);
        const tbody = document.createElement('tbody');
        const keys = Object.keys(kamus[lang]);
        keys.forEach(k => {
          const tr = document.createElement('tr');
          const tdK = document.createElement('td'); tdK.textContent = k; 
          const tdV = document.createElement('td'); tdV.textContent = kamus[lang][k];
          tr.appendChild(tdK); tr.appendChild(tdV); tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        sec.appendChild(table);
        container.appendChild(sec);
      }
    }
    if(document.readyState === 'complete' || document.readyState === 'interactive') renderKamus(); else window.addEventListener('DOMContentLoaded', renderKamus);
  </script>
</body>
</html>
